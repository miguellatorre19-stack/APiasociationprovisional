name: Automated API tests using Postman CLI

on: 
  pull_request: 
    branches: 
      - main
      - develop
  workflow_dispatch:
    
jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn package -DskipTests
      - run: docker build -t asociation-api:latest .
      - run: docker compose up -d
        env:
          API_PORT: 8080
          PROD_DB_NAME: association
          PROD_DB_USER: user
          PROD_DB_PASSWORD: password
          PROD_DB_ROOT_PASSWORD: lapiceros3
      - name: Wait for containers
        run: sleep 90
      - name: Check containers
        env:
          API_PORT: 8080
          PROD_DB_NAME: association
          PROD_DB_USER: user
          PROD_DB_PASSWORD: password
          PROD_DB_ROOT_PASSWORD: lapiceros3
        run: |
          docker compose ps
          docker compose logs asociation-api
      - name: Install Newman
        run: npm install -g newman
      - name: Run API tests
        run: |
          newman run ScriptTestingSocios.postman_collection.json -e asociation-dev.postman_environment.json --env-var baseURL=http://localhost:8080/api/
      - name: Show Docker logs
        if: failure()
        env:
          API_PORT: 8080
          PROD_DB_NAME: association
          PROD_DB_USER: user
          PROD_DB_PASSWORD: password
          PROD_DB_ROOT_PASSWORD: lapiceros3
        run: |
          docker compose ps
          docker compose logs

