name: Automated API tests using Postman CLI

on: 
  pull_request: 
    branches: 
      - main
      - develop
  workflow_dispatch:
    
jobs:
  automated-api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: mvn package -DskipTests
      - run: docker build -t asociation-api:latest .
      - run: docker compose up -d
        env:
          API_PORT: 8080
          PROD_DB_NAME: association
          PROD_DB_USER: user
          PROD_DB_PASSWORD: password
          PROD_DB_ROOT_PASSWORD: password
      - name: Wait for API
        run: |
          timeout 120 bash -c 'until curl -sS -o /dev/null http://localhost:8080/api/v1/socios; do sleep 5; done'
      - name: Install Newman
        run: npm install -g newman
      - name: Run API tests
        run: |
          newman run ScriptTestingSocios.postman_collection.json -e asociation-dev.postman_environment.json --env-var baseURL=http://localhost:8080/api/

